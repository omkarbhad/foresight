services:
  foresight:
    build: .
    container_name: foresight
    env_file:
      - .env
    ports:
      - "3000:3000"
      - "5001:5001"
    depends_on:
      - neo4j
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: foresight-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:?Set NEO4J_PASSWORD in .env}
      NEO4J_PLUGINS: '["apoc"]'
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  neo4j_data:
